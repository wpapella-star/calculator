<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <link href="stylesheet" id="style.css">
</head>
<body>
    <class="textArea"><input type="text" id="calcudisplay" disabled><br></class>    
    <class="buttons">
    <button onclick="addToDisplay('9')">9</button>
    <button onclick="addToDisplay('8')">8</button>
    <button onclick="addToDisplay('7')">7</button>
    <button onclick="addToDisplay('-')">-</button><br>
    <button onclick="addToDisplay('6')">6</button>
    <button onclick="addToDisplay('5')">5</button>
    <button onclick="addToDisplay('4')">4</button>
    <button onclick="addToDisplay('+')">+</button><br>
    <button onclick="addToDisplay('3')">3</button>
    <button onclick="addToDisplay('2')">2</button>
    <button onclick="addToDisplay('1')">1</button>
    <button onclick="addToDisplay('*')">*</button><br>
    <button onclick="addToDisplay('0')">0</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="calculate()">=</button>
    <button onclick="addToDisplay('/')">/</button><br>
    <button onclick="addToDisplay('(')">(</button>
    <button onclick="addToDisplay(')')">)</button>
    <button onclick="addToDisplay('&radic;')">√</button>
    <button onclick="addToDisplay('^')">^</buttons>
</class>
    <script>
        function addToDisplay(num) {
            document.getElementById('calcudisplay').value += num;
        }
        function clearDisplay() {
            document.getElementById('calcudisplay').value = '';
        }
        function calculate() {document.getElementById('calcudisplay').value = eval(document.getElementById('calcudisplay').value);
        }        
    </script>
</body>
</html>
